<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Atelier - Editorial design system in React + Vite">
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#d9d3c4" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#f4f1ea"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#d9d3c4" stroke-width="1"/>
  <text x="80" y="60" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="0.1em" fill="#5a5754">DESIGN SYSTEM / 00</text>
  <text x="1120" y="60" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="20" letter-spacing="0.1em" fill="#5a5754">EDITORIAL STUDY</text>
  <text x="600" y="320"
        text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="200"
        font-weight="300"
        letter-spacing="-0.02em"
        fill="#1a1a1a">Atelier<tspan font-style="italic" dx="-6" fill="#c8361d">.</tspan></text>
  <text x="600" y="410"
        text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="34"
        font-style="italic"
        fill="#5a5754">a quiet, refined editorial design system</text>
  <text x="600" y="460"
        text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-size="34"
        font-style="italic"
        fill="#5a5754">React + Vite, zero runtime dependencies</text>
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#d9d3c4" stroke-width="1"/>
  <text x="80" y="580" font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="0.1em" fill="#5a5754">ATELIER.DEV</text>
  <text x="1120" y="580" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="0.1em" fill="#5a5754">FRAUNCES + JETBRAINS MONO</text>
